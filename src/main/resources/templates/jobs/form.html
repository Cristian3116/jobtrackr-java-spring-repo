<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Job</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Add Job</h2>

<form th:action="@{/jobs}" th:object="${job}" method="post">

    <input class="form-control mb-2" th:field="*{title}" placeholder="Title"/>
    <input class="form-control mb-2" th:field="*{company}" placeholder="Company"/>
    <input class="form-control mb-2" th:field="*{location}" placeholder="Location"/>
    <input class="form-control mb-2" th:field="*{status}" placeholder="Status"/>

    <button class="btn btn-success">Save</button>
</form>

</body>
</html>
