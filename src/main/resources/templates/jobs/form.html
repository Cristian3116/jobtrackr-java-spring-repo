<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Job Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2 th:text="${job.id == null ? 'Add Job' : 'Edit Job'}">Job Details</h2>

<form th:action="@{/jobs/add}" th:object="${job}" method="post">
    <input type="hidden" th:field="*{id}" />

    <div class="mb-3">
        <label class="form-label">Position / Title</label>
        <input class="form-control" th:field="*{position}" placeholder="e.g. Software Engineer"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Company</label>
        <input class="form-control" th:field="*{company}" placeholder="e.g. Google"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Location</label>
        <input class="form-control" th:field="*{location}" placeholder="e.g. Remote / New York"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Status</label>
        <select class="form-select" th:field="*{status}">
            <option value="Applied">Applied</option>
            <option value="Interviewing">Interviewing</option>
            <option value="Offered">Offered</option>
            <option value="Rejected">Rejected</option>
        </select>
    </div>

    <button type="submit" class="btn btn-success">Save Job</button>
    <a th:href="@{/jobs}" class="btn btn-secondary">Cancel</a>
</form>

</body>
</html>
